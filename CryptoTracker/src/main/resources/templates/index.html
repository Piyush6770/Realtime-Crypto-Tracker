<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Tracker</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 30px;
      /* Neon Text Effect */
      background: -webkit-linear-gradient(#4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    label {
      display: block;
      margin-bottom: 12px;
      font-size: 0.95rem;
      color: #cbd5e1;
      font-weight: 600;
    }

    select {
      width: 100%;
      padding: 14px 15px;
      margin-bottom: 25px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
      transition: border 0.3s;
    }

    select:focus {
      border: 1px solid #4facfe;
    }

    select option {
      background: #203a43;
      color: #fff;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00C9FF 0%, #92FE9D 100%);
      color: #0f2027;
      font-weight: 800;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 201, 255, 0.4);
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Crypto Tracker</h1>

  <!-- Ensure the name is "coins" to match the Java controller -->
  <form action="/track" method="POST">
    <label for="crypto-select">Choose a Cryptocurrency:</label>

    <select id="crypto-select" name="coins" required>
      <option value="" disabled selected>-- Select a Coin --</option>
      <option value="bitcoin">Bitcoin (BTC)</option>
      <option value="ethereum">Ethereum (ETH)</option>
      <option value="solana">Solana (SOL)</option>
      <option value="ripple">Ripple (XRP)</option>
      <option value="dogecoin">Dogecoin (DOGE)</option>
      <option value="cardano">Cardano (ADA)</option>
    </select>

    <button type="submit">Track Price</button>
  </form>
</div>

</body>
</html>
