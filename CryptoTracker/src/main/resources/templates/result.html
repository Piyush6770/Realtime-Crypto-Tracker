<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crypto Results</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2.2rem;
            background: -webkit-linear-gradient(#92FE9D, #00C9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        th {
            background: rgba(0, 0, 0, 0.4);
            color: #92FE9D;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        tr {
            transition: background 0.2s;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        td {
            font-size: 1.1rem;
        }

        /* Formats the price nicely */
        .price-col {
            font-weight: 600;
            color: #fff;
        }

        .back-link {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="table-container">
    <h2>Live Crypto Prices</h2>

    <table>
        <thead>
        <tr>
            <th>Coin</th>
            <th>Price (USD)</th>
            <th>24h Change (%)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each = "coin : ${coins}">
            <td th:text = "${coin.name}"></td>
            <td th:text = "${coin.price}"></td>
            <td th:text = "${coin.crypto24h}"></td>
        </tr>
        </tbody>
    </table>

    <!-- Added a button to go back to the search form -->
    <a href="/" class="back-link">← Search Again</a>
</div>

</body>
</html>
